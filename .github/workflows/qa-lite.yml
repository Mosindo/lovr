name: QA Lite

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  qa-lite:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-dev-only-change-this
      DATABASE_URL: postgresql://app:app@localhost:5432/app?sslmode=disable
      PORT: "18080"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.sum

      - name: Install mobile deps
        working-directory: apps/mobile
        run: npm ci

      - name: Start API
        shell: bash
        run: |
          nohup go run ./services/api/cmd/api >/tmp/lovr-api.log 2>&1 &
          echo $! >/tmp/lovr-api.pid

      - name: Wait API health
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:18080/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API healthcheck timeout"
          tail -n 200 /tmp/lovr-api.log || true
          exit 1

      - name: Run QA lite
        shell: pwsh
        run: ./scripts/qa-lite.ps1 -ApiBaseUrl http://localhost:18080

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-lite-reports
          path: |
            .smoke/qa-lite-report.txt
            .smoke/report.txt
          if-no-files-found: warn

      - name: API logs on failure
        if: failure()
        shell: bash
        run: tail -n 200 /tmp/lovr-api.log || true

      - name: Shutdown API
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/lovr-api.pid ]; then
            kill "$(cat /tmp/lovr-api.pid)" || true
          fi
