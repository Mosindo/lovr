name: QA Lite

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  qa-lite:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-dev-only-change-this

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.sum

      - name: Install mobile deps
        working-directory: apps/mobile
        run: npm ci

      - name: Start API + DB
        run: docker compose -f infra/docker-compose.yml up --build -d

      - name: Wait API health
        shell: bash
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:18080/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API healthcheck timeout"
          docker compose -f infra/docker-compose.yml logs api postgres || true
          exit 1

      - name: Run QA lite
        shell: pwsh
        run: ./scripts/qa-lite.ps1 -ApiBaseUrl http://localhost:18080

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-lite-reports
          path: .smoke/*.txt

      - name: Compose logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs api postgres

      - name: Shutdown stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
