appId: ${APP_ID}
name: Boilerplate Critical Flow
---
- launchApp:
    clearState: true

- assertVisible: Login
- tapOn:
    id: auth-email-input
- inputText: ${TEST_EMAIL}
- tapOn:
    id: auth-password-input
- inputText: ${TEST_PASSWORD}
- tapOn:
    id: auth-submit-button

- assertVisible:
    id: home-screen

- tapOn:
    id: home-post-title-input
- inputText: Maestro boilerplate post
- tapOn:
    id: home-post-body-input
- inputText: Validating the generic home feed from the UI flow.
- tapOn:
    id: home-post-submit-button
- assertVisible: Maestro boilerplate post

- tapOn: Chat
- assertVisible:
    id: chat-screen
- tapOn: ${CONTACT_EMAIL}
- tapOn:
    id: chat-message-input
- inputText: maestro ui ping
- tapOn:
    id: chat-send-button
- assertVisible: maestro ui ping

- tapOn: Notifications
- assertVisible:
    id: notifications-screen
- assertVisible: ${NOTIFICATION_TITLE}

- tapOn: Profile
- assertVisible:
    id: profile-screen
